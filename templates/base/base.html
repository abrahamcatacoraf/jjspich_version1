<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block titulo %}Taller JJ SPICH{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .sidebar { min-height: 100vh; background-color: #1a1a2e; }
    .sidebar .nav-link { color: #ccc; padding: 10px 20px; }
    .sidebar .nav-link:hover { color: #fff; background-color: #16213e; }
    .sidebar .nav-link.active { color: #fff; background-color: #0f3460; }
    .sidebar .brand { color: #fff; font-size: 1.2rem; font-weight: bold; padding: 20px; border-bottom: 1px solid #333; }
    .main-content { padding: 30px; }
    .navbar-top { background-color: #fff; border-bottom: 1px solid #dee2e6; padding: 10px 20px; }
  </style>
</head>
<body>
<div class="d-flex">

  <!-- Menú lateral -->
  <div class="sidebar d-flex flex-column" style="width:240px; min-width:240px;">
    <div class="brand">
      <i class="bi bi-wrench-adjustable"></i> JJ SPICH
    </div>
    <nav class="nav flex-column mt-2">
      <a href="/" class="nav-link {% block nav_inicio %}{% endblock %}">
        <i class="bi bi-speedometer2 me-2"></i>Dashboard
      </a>
      <a href="/clientes/" class="nav-link {% block nav_clientes %}{% endblock %}">
        <i class="bi bi-people me-2"></i>Clientes
      </a>
      <a href="/vehiculos/" class="nav-link {% block nav_vehiculos %}{% endblock %}">
        <i class="bi bi-car-front me-2"></i>Vehículos
      </a>
      <a href="/ordenes/" class="nav-link {% block nav_ordenes %}{% endblock %}">
        <i class="bi bi-clipboard-check me-2"></i>Órdenes de trabajo
      </a>
      <a href="/inventario/" class="nav-link {% block nav_inventario %}{% endblock %}">
        <i class="bi bi-box-seam me-2"></i>Inventario
      </a>
      <a href="/pagos/" class="nav-link {% block nav_pagos %}{% endblock %}">
        <i class="bi bi-cash-coin me-2"></i>Pagos
      </a>
    </nav>
    <div class="mt-auto p-3" style="border-top:1px solid #333;">
      <a href="/admin/" class="nav-link text-warning">
        <i class="bi bi-gear me-2"></i>Administración
      </a>
    </div>
  </div>

  <!-- Contenido principal -->
  <div class="flex-grow-1">
    <div class="navbar-top d-flex justify-content-between align-items-center">
      <h6 class="mb-0 text-muted">{% block subtitulo %}{% endblock %}</h6>
      <span class="text-muted small"><i class="bi bi-person-circle me-1"></i>{{ request.user.username }}</span>
    </div>
    <div class="main-content">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
      {% block contenido %}{% endblock %}
    </div>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
