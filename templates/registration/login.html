<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — JJ SPICH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background-color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .brand-icon {
      width: 64px;
      height: 64px;
      background: #0f3460;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
  </style>
</head>
<body>
  <div class="login-card shadow-lg">
    <div class="text-center mb-4">
      <div class="brand-icon">
        <i class="bi bi-wrench-adjustable text-white fs-3"></i>
      </div>
      <h4 class="fw-bold mb-1">JJ SPICH</h4>
      <p class="text-muted small">Taller de Chapa y Pintura</p>
    </div>

    {% if form.errors %}
      <div class="alert alert-danger py-2">
        <i class="bi bi-exclamation-circle me-1"></i>
        Usuario o contraseña incorrectos.
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control"
                 placeholder="Tu usuario" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control"
                 placeholder="Tu contraseña" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar al sistema
      </button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0">
      Sistema de gestión — La Paz, Bolivia
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
