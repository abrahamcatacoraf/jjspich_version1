{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — JJ SPICH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d0d0d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(circle at 20% 50%, #1a0000 0%, #0d0d0d 60%);
    }

    .login-card {
      background: #111111;
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }

    .btn-primary {
      background: #f97316 !important;
      border-color: #f97316 !important;
    }

    .btn-primary:hover {
      background: #ea6c0a !important;
      border-color: #ea6c0a !important;
    }

    .input-group-text {
      background: #1a1a1a;
      border-color: #333;
      border-right: none;
      color: #888;
    }

    .form-control {
      background: #1a1a1a;
      border-color: #333;
      border-left: none;
      color: white;
    }

    .form-control::placeholder {
      color: #555;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #f97316;
      background: #1a1a1a;
      color: white;
    }

    .form-label {
      color: #ccc;
      font-weight: 600;
    }

    .text-muted {
      color: #888 !important;
    }

    hr {
      border-color: #2a2a2a;
    }

    .alert-danger {
      background: #2a0000;
      color: #f87171;
      border: 1px solid #7f1d1d !important;
    }

    /* Forzar fondo oscuro en autocompletado del navegador */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0px 1000px #1a1a1a inset !important;
      -webkit-text-fill-color: white !important;
      border-color: #333 !important;
    }
  </style>
</head>
<body>
  <div class="login-card">

    <!-- LOGO -->
    <div class="text-center mb-4">
      <img src="{% static 'img/logo_jjspich.png' %}"
           alt="JJ SPICH"
           style="width:180px; display:block; margin:0 auto 12px;">
      <p class="text-muted small mb-0">Sistema de Gestión Automotriz</p>
      <p class="text-muted small">La Paz, Bolivia</p>
    </div>

    {% if form.errors %}
      <div class="alert alert-danger py-2 mb-3">
        <i class="bi bi-exclamation-circle me-1"></i>
        Usuario o contraseña incorrectos.
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control"
                 placeholder="Tu usuario" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control"
                 placeholder="Tu contraseña" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar al sistema
      </button>
    </form>

    <hr class="my-4">
    <p class="text-center text-muted small mb-0">
      <i class="bi bi-shield-check me-1"></i>
      Acceso restringido — Solo personal autorizado
    </p>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
